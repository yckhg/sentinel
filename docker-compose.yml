# Sentinel — Docker Compose
# Industrial safety real-time monitoring system

# Common log rotation: cap json-file logs so long-running services can't fill
# the shared mini-PC disk (co-located with recordings). (#47)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Base image builder: produces sentinel-ffmpeg-base for the ffmpeg-dependent
  # adapters (recording, cctv-adapter, youtube-adapter). One-shot helper — runs
  # `true` and exits; adapters gate on its completion so the image exists before
  # they build. Lets a clean host come up with a single `docker compose up -d`. (#45)
  ffmpeg-base:
    build:
      context: .
      dockerfile: docker/ffmpeg-base.Dockerfile
    image: sentinel-ffmpeg-base
    pull_policy: build
    command: ["true"]
    restart: "no"
    logging: *default-logging
    networks:
      - sentinel-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sentinel-mosquitto
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "20011:1883"
    volumes:
      - ./services/hw-gateway/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - sentinel-net
    # Port 20011: external MQTT for ESP32 voice devices
    # Disk persistence keeps the gateway's persistent session across broker restart

  hw-gateway:
    build: ./services/hw-gateway
    container_name: sentinel-hw-gateway
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - NOTIFIER_URL=http://notifier:8080
      - WEB_BACKEND_URL=http://web-backend:8080
      - HEARTBEAT_TIMEOUT_SEC=30
      - EQUIPMENT_MAX_DEVICES=1000
      - EQUIPMENT_EVICT_TTL_SEC=86400
      # Shared secret sent as X-Internal-Token on POST /api/devices/seen and
      # POST /api/incidents. web-backend validates it fail-closed, so this MUST
      # match web-backend's INTERNAL_TOKEN. Inject the SAME value in .env/deploy;
      # if unset, web-backend rejects seen/incidents with 401. (sensor-device-lifecycle)
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - mosquitto
    networks:
      - sentinel-net
    # ports: internal only

  cctv-adapter:
    build: ./services/cctv-adapter
    container_name: sentinel-cctv-adapter
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    environment:
      - CAMERAS_CONFIG_PATH=/config/cameras.json
      - STREAMING_RTMP_URL=rtmp://streaming:1935/live
      - WEB_BACKEND_URL=http://web-backend:8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./config/cameras.json:/config/cameras.json:ro
    depends_on:
      streaming:
        condition: service_started
      ffmpeg-base:
        condition: service_completed_successfully
    networks:
      - sentinel-net
    # ports: internal only

  streaming:
    build: ./services/streaming
    container_name: sentinel-streaming
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    tmpfs:
      # HLS output is volatile: tmpfs wipes /tmp/hls on every restart AND recreate,
      # so no stale playlist survives to falsely report active:true after a restart
      # (streaming §단언 G / interface-streaming §계약 4 A4-6).
      - /tmp/hls
    networks:
      - sentinel-net
    # ports: internal only

  notifier:
    build: ./services/notifier
    container_name: sentinel-notifier
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - WEB_BACKEND_URL=http://web-backend:8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
      - RECORDING_URL=http://recording:8080
      - KAKAO_ENABLED=${KAKAO_ENABLED:-false}
      - KAKAO_API_URL=${KAKAO_API_URL:-}
      - KAKAO_API_KEY=${KAKAO_API_KEY:-}
      - KAKAO_SENDER_KEY=${KAKAO_SENDER_KEY:-}
      - KAKAO_TEMPLATE_CODE=${KAKAO_TEMPLATE_CODE:-CRISIS_ALERT}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - NHN_SMS_APP_KEY=${NHN_SMS_APP_KEY:-}
      - NHN_SMS_SECRET_KEY=${NHN_SMS_SECRET_KEY:-}
      - NHN_SMS_SENDER_NO=${NHN_SMS_SENDER_NO:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - web-backend
    networks:
      - sentinel-net
    # ports: internal only

  recording:
    build: ./services/recording
    container_name: sentinel-recording
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    environment:
      - STREAMING_RTMP_URL=rtmp://streaming:1935/live
      - WEB_BACKEND_URL=http://web-backend:8080
      - RECORDINGS_DIR=/recordings
      - ARCHIVES_DIR=/archives
      - ROLLING_WINDOW_MINUTES=60
      - FFMPEG_TIMEOUT=60
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - recordings-data:/recordings
      - archives-data:/archives
    depends_on:
      streaming:
        condition: service_started
      web-backend:
        condition: service_healthy
      ffmpeg-base:
        condition: service_completed_successfully
    networks:
      - sentinel-net
    # ports: internal only

  web-backend:
    build: ./services/web-backend
    container_name: sentinel-web-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - HW_GATEWAY_URL=http://hw-gateway:8080
      - STREAMING_URL=http://streaming:8080
      - CCTV_ADAPTER_URL=http://cctv-adapter:8080
      - YOUTUBE_ADAPTER_URL=http://youtube-adapter:8080
      - NOTIFIER_URL=http://notifier:8080
      - RECORDING_URL=http://recording:8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
      # Admin seed + JWT signing key. Without these the documented .env values
      # never reached web-backend, so it always seeded the default password and
      # regenerated the JWT secret on every restart (invalidating sessions). (#46)
      - JWT_SECRET=${JWT_SECRET:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Shared secret for the internal seen/incidents trust boundary. Validated
      # fail-closed: if empty, POST /api/devices/seen and POST /api/incidents
      # return 401. MUST match hw-gateway's INTERNAL_TOKEN — inject the SAME
      # value in .env/deploy (do not hardcode). (sensor-device-lifecycle)
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - db-data:/data
    networks:
      - sentinel-net
    # ports: internal only

  web-frontend:
    build: ./services/web-frontend
    container_name: sentinel-web-frontend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "3080:80"
    networks:
      - sentinel-net
      - yc-network
    depends_on:
      - web-backend
      - streaming

  youtube-adapter:
    build: ./services/youtube-adapter
    container_name: sentinel-youtube-adapter
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    environment:
      - YOUTUBE_CONFIG_PATH=/config/youtube-sources.json
      - STREAMING_RTMP_URL=rtmp://streaming:1935/live
      - WEB_BACKEND_URL=http://web-backend:8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./config/youtube-sources.json:/config/youtube-sources.json:ro
      - ./media:/media:ro
    depends_on:
      streaming:
        condition: service_started
      web-backend:
        condition: service_started
      ffmpeg-base:
        condition: service_completed_successfully
    networks:
      - sentinel-net
    # ports: internal only

  # E2E test services (run with: docker compose --profile test run --rm <test-name>)
  e2e-crisis:
    build: ./tests/e2e-crisis
    container_name: sentinel-e2e-crisis
    profiles:
      - test
    environment:
      - WEB_BACKEND_URL=http://web-backend:8080
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-sentinel1234}
    depends_on:
      - mosquitto
      - hw-gateway
      - notifier
      - web-backend
    networks:
      - sentinel-net

  e2e-restart:
    build: ./tests/e2e-restart
    container_name: sentinel-e2e-restart
    profiles:
      - test
    environment:
      - WEB_BACKEND_URL=http://web-backend:8080
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-sentinel1234}
    depends_on:
      - mosquitto
      - hw-gateway
      - web-backend
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge
  yc-network:
    external: true

volumes:
  db-data:
  recordings-data:
  archives-data:
  mosquitto-data:
