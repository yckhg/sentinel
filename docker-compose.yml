# Sentinel — Docker Compose
# Industrial safety real-time monitoring system

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sentinel-mosquitto
    restart: unless-stopped
    command: mosquitto -c /mosquitto-no-auth.conf
    networks:
      - sentinel-net
    # ports: internal only (1883)

  hw-gateway:
    build: ./services/hw-gateway
    container_name: sentinel-hw-gateway
    restart: unless-stopped
    environment:
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - NOTIFIER_URL=http://notifier:8080
      - WEB_BACKEND_URL=http://web-backend:8080
      - HEARTBEAT_TIMEOUT=30
    depends_on:
      - mosquitto
    networks:
      - sentinel-net
    # ports: internal only

  cctv-adapter:
    build: ./services/cctv-adapter
    container_name: sentinel-cctv-adapter
    restart: unless-stopped
    networks:
      - sentinel-net
    # ports: internal only

  streaming:
    build: ./services/streaming
    container_name: sentinel-streaming
    restart: unless-stopped
    networks:
      - sentinel-net
    # ports: internal only

  notifier:
    build: ./services/notifier
    container_name: sentinel-notifier
    restart: unless-stopped
    networks:
      - sentinel-net
    # ports: internal only

  web-backend:
    build: ./services/web-backend
    container_name: sentinel-web-backend
    restart: unless-stopped
    volumes:
      - db-data:/data
    networks:
      - sentinel-net
    # ports: internal only

  web-frontend:
    build: ./services/web-frontend
    container_name: sentinel-web-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    networks:
      - sentinel-net
    depends_on:
      - web-backend
      - streaming

networks:
  sentinel-net:
    driver: bridge

volumes:
  db-data:
