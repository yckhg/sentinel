# Sentinel — Docker Compose
# Industrial safety real-time monitoring system

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sentinel-mosquitto
    restart: unless-stopped
    command: mosquitto -c /mosquitto-no-auth.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-net
    # ports: internal only (1883)

  hw-gateway:
    build: ./services/hw-gateway
    container_name: sentinel-hw-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - NOTIFIER_URL=http://notifier:8080
      - WEB_BACKEND_URL=http://web-backend:8080
      - HEARTBEAT_TIMEOUT=30
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - mosquitto
    networks:
      - sentinel-net
    # ports: internal only

  cctv-adapter:
    build: ./services/cctv-adapter
    container_name: sentinel-cctv-adapter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    environment:
      - CAMERAS_CONFIG_PATH=/config/cameras.json
      - STREAMING_RTMP_URL=rtmp://streaming:1935/live
      - WEB_BACKEND_URL=http://web-backend:8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./config/cameras.json:/config/cameras.json:ro
    depends_on:
      - streaming
    networks:
      - sentinel-net
    # ports: internal only

  streaming:
    build: ./services/streaming
    container_name: sentinel-streaming
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sentinel-net
    # ports: internal only

  notifier:
    build: ./services/notifier
    container_name: sentinel-notifier
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - WEB_BACKEND_URL=http://web-backend:8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
      - KAKAO_API_URL=${KAKAO_API_URL:-}
      - KAKAO_API_KEY=${KAKAO_API_KEY:-}
      - KAKAO_SENDER_KEY=${KAKAO_SENDER_KEY:-}
      - KAKAO_TEMPLATE_CODE=${KAKAO_TEMPLATE_CODE:-CRISIS_ALERT}
      - NHN_SMS_APP_KEY=${NHN_SMS_APP_KEY:-}
      - NHN_SMS_SECRET_KEY=${NHN_SMS_SECRET_KEY:-}
      - NHN_SMS_SENDER_NO=${NHN_SMS_SENDER_NO:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - web-backend
    networks:
      - sentinel-net
    # ports: internal only

  web-backend:
    build: ./services/web-backend
    container_name: sentinel-web-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - HW_GATEWAY_URL=http://hw-gateway:8080
      - STREAMING_URL=http://streaming:8080
      - CCTV_ADAPTER_URL=http://cctv-adapter:8080
      - YOUTUBE_ADAPTER_URL=http://youtube-adapter:8080
      - NOTIFIER_URL=http://notifier:8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - db-data:/data
    networks:
      - sentinel-net
    # ports: internal only

  web-frontend:
    build: ./services/web-frontend
    container_name: sentinel-web-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "3080:80"
    networks:
      - sentinel-net
      - yc-network
    depends_on:
      - web-backend
      - streaming

  youtube-adapter:
    build: ./services/youtube-adapter
    container_name: sentinel-youtube-adapter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    environment:
      - YOUTUBE_CONFIG_PATH=/config/youtube-sources.json
      - STREAMING_RTMP_URL=rtmp://streaming:1935/live
      - WEB_BACKEND_URL=http://web-backend:8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./config/youtube-sources.json:/config/youtube-sources.json:ro
      - ./media:/media:ro
    depends_on:
      - streaming
      - web-backend
    networks:
      - sentinel-net
    # ports: internal only

  # E2E test services (run with: docker compose --profile test run --rm <test-name>)
  e2e-crisis:
    build: ./tests/e2e-crisis
    container_name: sentinel-e2e-crisis
    profiles:
      - test
    environment:
      - WEB_BACKEND_URL=http://web-backend:8080
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-sentinel1234}
    depends_on:
      - mosquitto
      - hw-gateway
      - notifier
      - web-backend
    networks:
      - sentinel-net

  e2e-restart:
    build: ./tests/e2e-restart
    container_name: sentinel-e2e-restart
    profiles:
      - test
    environment:
      - WEB_BACKEND_URL=http://web-backend:8080
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-sentinel1234}
    depends_on:
      - mosquitto
      - hw-gateway
      - web-backend
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge
  yc-network:
    external: true

volumes:
  db-data:
