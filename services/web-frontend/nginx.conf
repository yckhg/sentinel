server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /healthz {
        return 200 '{"status":"ok","service":"web-frontend"}';
        add_header Content-Type application/json;
    }
}
