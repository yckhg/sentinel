# Sentinel mosquitto broker config.
# no-auth plain listener on 1883 (existing behavior) + disk persistence so the
# gateway's persistent session (clean=false) survives a broker restart and
# QoS1/2 in-flight messages are redelivered on reconnect
# (docs/spec/interface-mqtt.md §브로커 접속 계약 "세션 지속성"; hw-gateway assertion S).

listener 1883
allow_anonymous true

# Session / message durability across broker restarts.
persistence true
persistence_location /mosquitto/data/
# Flush the in-memory DB to disk periodically (seconds).
autosave_interval 30
